<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pay My Buddy</title>

    <style>

        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg,#f5f7fb,#e8ecf7);
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .container{
            text-align:center;
        }

        .logo{
            width:180px;
            margin-bottom:20px;
        }

        h1{
            font-size:48px;
            color:#0d1b3d;
            margin:10px 0;
        }

        p{
            color:#555;
            font-size:18px;
            margin-bottom:40px;
        }

        .btn{
            background:#ff7a45;
            color:white;
            padding:15px 40px;
            font-size:18px;
            border:none;
            border-radius:30px;
            cursor:pointer;
            text-decoration:none;
            transition:0.3s;
        }

        .btn:hover{
            background:#ff5c21;
            transform:translateY(-2px);
        }

        .footer{
    margin-top:60px;
    font-size:14px;
    color:#777;
}

    </style>
</head>

<body>

<div class="container">

    <img src="/images/paymybuddy.png" class="logo" alt="">

    <h1>Pay My Buddy</h1>

    <p>Envoyez de l'argent facilement à vos amis.</p>

    <a href="/profile" class="btn">
        Profil
    </a>

    <footer class="footer">
        © 2026 Pay My Buddy • Developed by Alexis Loire
    </footer>

</div>

</body>
</html>
